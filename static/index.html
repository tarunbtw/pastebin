<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pastebin — share code & text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg: #111113;
      --bg2: #18181b;
      --surface: #1c1c1f;
      --surface2: #222226;
      --border: #2e2e32;
      --border-focus: #52525b;
      --text: #fafafa;
      --text-dim: #71717a;
      --text-muted: #3f3f46;
      --accent: #ffffff;
      --accent-fg: #000000;
      --tag-bg: #27272a;
      --scrollbar: #27272a;
    }

    :root[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #f4f4f5;
      --surface: #ffffff;
      --surface2: #f4f4f5;
      --border: #e4e4e7;
      --border-focus: #a1a1aa;
      --text: #09090b;
      --text-dim: #71717a;
      --text-muted: #d4d4d8;
      --accent: #09090b;
      --accent-fg: #ffffff;
      --tag-bg: #f4f4f5;
      --scrollbar: #e4e4e7;
    }

    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--text-dim); font-weight: 300; }

    .header-right { display: flex; align-items: center; gap: 0.5rem; }

    .theme-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .theme-btn:hover { border-color: var(--border-focus); color: var(--text); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 2rem 1.5rem;
      gap: 1rem;
    }

    .page-title {
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
    }

    /* ── EDITOR ── */
    .editor-container {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .editor-container:focus-within { border-color: var(--border-focus); }

    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      height: 40px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .editor-dots { display: flex; gap: 5px; }

    .dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--border);
    }

    .line-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .editor-body { display: flex; }

    .line-numbers {
      padding: 1rem 0;
      min-width: 48px;
      text-align: right;
      border-right: 1px solid var(--border);
      background: var(--surface2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text-muted);
      padding-right: 0.75rem;
      padding-left: 0.5rem;
      user-select: none;
    }

    #content {
      flex: 1;
      min-height: 380px;
      padding: 1rem 1.2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text);
      background: transparent;
      border: none;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    #content::placeholder { color: var(--text-muted); }

    /* ── OPTIONS ── */
    .options-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      flex: 1;
      min-width: 160px;
    }

    .field label {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .field select,
    .field input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0.6rem 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
      width: 100%;
    }

    .field select:focus,
    .field input:focus { border-color: var(--border-focus); }

    .field input::placeholder { color: var(--text-muted); }

    /* ── ACTIONS ── */
    .actions-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .meta-info {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      gap: 1.5rem;
    }

    .btn-submit {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.7rem 1.8rem;
      border-radius: 7px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-submit:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .footer-text a { color: var(--text-dim); text-decoration: none; }
    .footer-text a:hover { color: var(--text); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    main > * {
      animation: fadeUp 0.3s ease both;
    }

    main > *:nth-child(1) { animation-delay: 0.05s; }
    main > *:nth-child(2) { animation-delay: 0.1s; }
    main > *:nth-child(3) { animation-delay: 0.15s; }
    main > *:nth-child(4) { animation-delay: 0.2s; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">paste<span>bin</span></a>
    <div class="header-right">
      <button class="theme-btn" id="theme-btn" title="toggle theme">☀</button>
    </div>
  </header>

  <main>
    <div class="page-title">// new paste</div>

    <div class="editor-container">
      <div class="editor-header">
        <div class="editor-dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="line-count" id="line-count">0 lines</div>
      </div>
      <div class="editor-body">
        <div class="line-numbers" id="line-numbers">1</div>
        <textarea id="content" placeholder="paste your code or text here..." spellcheck="false"></textarea>
      </div>
    </div>

    <div class="options-row">
      <div class="field">
        <label>language</label>
        <select id="language">
          <option value="plaintext">plaintext</option>
          <option value="javascript">javascript</option>
          <option value="typescript">typescript</option>
          <option value="python">python</option>
          <option value="go">go</option>
          <option value="rust">rust</option>
          <option value="c">c</option>
          <option value="cpp">c++</option>
          <option value="java">java</option>
          <option value="bash">bash</option>
          <option value="sql">sql</option>
          <option value="json">json</option>
          <option value="html">html</option>
          <option value="css">css</option>
          <option value="yaml">yaml</option>
          <option value="markdown">markdown</option>
          <option value="dockerfile">dockerfile</option>
        </select>
      </div>

      <div class="field">
        <label>expiry</label>
        <select id="expires_in">
          <option value="never">never</option>
          <option value="1h">1 hour</option>
          <option value="24h">24 hours</option>
          <option value="7d">7 days</option>
          <option value="30d">30 days</option>
        </select>
      </div>

      <div class="field">
        <label>view limit</label>
        <input type="number" id="view_limit" placeholder="unlimited" min="1"/>
      </div>
    </div>

    <div class="actions-row">
      <div class="meta-info">
        <span id="char-count">0 chars</span>
        <span id="line-display">0 lines</span>
      </div>
      <button class="btn-submit" id="btn" onclick="createPaste()">create paste →</button>
    </div>
  </main>

  <footer>
    <div class="footer-text">built in go · <a href="https://github.com/tarunbtw/pastebin" target="_blank">source</a></div>
    <div class="footer-text">ctrl+enter to submit</div>
  </footer>

  <script>
    // theme
    const root = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');
    const saved = localStorage.getItem('theme') || 'dark';
    root.setAttribute('data-theme', saved);
    themeBtn.textContent = saved === 'dark' ? '☀' : '☾';

    themeBtn.addEventListener('click', () => {
      const current = root.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeBtn.textContent = next === 'dark' ? '☀' : '☾';
    });

    // editor
    const content = document.getElementById('content');
    const lineNumbers = document.getElementById('line-numbers');
    const lineCount = document.getElementById('line-count');
    const charCount = document.getElementById('char-count');
    const lineDisplay = document.getElementById('line-display');

    function updateEditor() {
      const lines = content.value.split('\n');
      const count = lines.length;
      lineNumbers.textContent = Array.from({length: count}, (_, i) => i + 1).join('\n');
      lineCount.textContent = count + ' lines';
      charCount.textContent = content.value.length.toLocaleString() + ' chars';
      lineDisplay.textContent = count + ' lines';
    }

    content.addEventListener('input', updateEditor);
    content.addEventListener('scroll', () => {
      lineNumbers.scrollTop = content.scrollTop;
    });

    content.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = content.selectionStart;
        const end = content.selectionEnd;
        content.value = content.value.substring(0, start) + '  ' + content.value.substring(end);
        content.selectionStart = content.selectionEnd = start + 2;
        updateEditor();
      }
      if (e.ctrlKey && e.key === 'Enter') createPaste();
    });

    async function createPaste() {
      const btn = document.getElementById('btn');
      const text = content.value.trim();
      if (!text) { content.focus(); return; }

      btn.disabled = true;
      btn.textContent = 'creating...';

      const viewLimit = document.getElementById('view_limit').value;
      const body = {
        content: text,
        language: document.getElementById('language').value,
        expires_in: document.getElementById('expires_in').value,
      };
      if (viewLimit) body.view_limit = parseInt(viewLimit);

      try {
        const res = await fetch('/api/paste', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('something went wrong');
          btn.disabled = false;
          btn.textContent = 'create paste →';
        }
      } catch {
        alert('failed to create paste');
        btn.disabled = false;
        btn.textContent = 'create paste →';
      }
    }

    updateEditor();
  </script>
</body>
</html>
