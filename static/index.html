<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pastebin — share code & text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #171717;
      --surface2: #1e1e1e;
      --border: #282828;
      --border-focus: #444;
      --text: #e8e8e8;
      --text-dim: #666;
      --text-muted: #333;
      --accent: #e8e8e8;
      --accent-fg: #0f0f0f;
    }

    [data-theme="light"] {
      --bg: #f5f5f4;
      --surface: #ffffff;
      --surface2: #f0f0ef;
      --border: #e0e0de;
      --border-focus: #aaa;
      --text: #1a1a1a;
      --text-dim: #777;
      --text-muted: #ccc;
      --accent: #1a1a1a;
      --accent-fg: #ffffff;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      height: 56px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 4rem;
    }

    .header-inner {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.3px;
    }

    .logo span { color: var(--text-dim); }

    .theme-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 30px; height: 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
    }

    .theme-btn:hover { border-color: var(--border-focus); color: var(--text); }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 2.5rem 4rem;
    }

    .inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .page-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* ── EDITOR ── */
    .editor {
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .editor:focus-within { border-color: var(--border-focus); }

    .editor-bar {
      height: 38px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
    }

    .dots { display: flex; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--border); }

    .editor-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
    }

    .editor-body { display: flex; min-height: 400px; }

    .gutter {
      padding: 1rem 0.75rem;
      background: var(--surface2);
      border-right: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.75;
      color: var(--text-muted);
      text-align: right;
      user-select: none;
      min-width: 44px;
      white-space: pre;
    }

    #content {
      flex: 1;
      padding: 1rem 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.75;
      color: var(--text);
      background: transparent;
      border: none;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    #content::placeholder { color: var(--text-muted); }

    /* ── OPTIONS ── */
    .options {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
      min-width: 150px;
    }

    .field label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .field select,
    .field input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.55rem 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
      width: 100%;
    }

    .field select:focus,
    .field input:focus { border-color: var(--border-focus); }
    .field input::placeholder { color: var(--text-muted); }

    /* ── SUBMIT ── */
    .submit-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stats {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      display: flex;
      gap: 1.2rem;
    }

    .btn-create {
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      padding: 0.65rem 1.6rem;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.15s;
    }

    .btn-create:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn-create:active { transform: translateY(0); }
    .btn-create:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* ── FOOTER ── */
    footer {
      height: 48px;
      border-top: 1px solid var(--border);
      padding: 0 4rem;
      display: flex;
      align-items: center;
    }

    .footer-inner {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
    }

    .footer-text a { color: var(--text-dim); text-decoration: none; }
    .footer-text a:hover { color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .inner > * { animation: fadeUp 0.3s ease both; }
    .inner > *:nth-child(1) { animation-delay: 0.03s; }
    .inner > *:nth-child(2) { animation-delay: 0.07s; }
    .inner > *:nth-child(3) { animation-delay: 0.11s; }
    .inner > *:nth-child(4) { animation-delay: 0.15s; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="/" class="logo">paste<span>bin</span></a>
      <button class="theme-btn" id="theme-btn" title="toggle theme">☀</button>
    </div>
  </header>

  <main>
    <div class="inner">
      <div class="page-label">// new paste</div>

      <div class="editor">
        <div class="editor-bar">
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
          <div class="editor-meta" id="editor-meta">0 lines</div>
        </div>
        <div class="editor-body">
          <div class="gutter" id="gutter">1</div>
          <textarea id="content" placeholder="paste your code or text here..." spellcheck="false" autocomplete="off"></textarea>
        </div>
      </div>

      <div class="options">
        <div class="field">
          <label>Language</label>
          <select id="language">
            <option value="plaintext">plaintext</option>
            <option value="javascript">javascript</option>
            <option value="typescript">typescript</option>
            <option value="python">python</option>
            <option value="go">go</option>
            <option value="rust">rust</option>
            <option value="c">c</option>
            <option value="cpp">c++</option>
            <option value="java">java</option>
            <option value="bash">bash</option>
            <option value="sql">sql</option>
            <option value="json">json</option>
            <option value="html">html</option>
            <option value="css">css</option>
            <option value="yaml">yaml</option>
            <option value="markdown">markdown</option>
            <option value="dockerfile">dockerfile</option>
          </select>
        </div>

        <div class="field">
          <label>Expiry</label>
          <select id="expires_in">
            <option value="never">never</option>
            <option value="1h">1 hour</option>
            <option value="24h">24 hours</option>
            <option value="7d">7 days</option>
            <option value="30d">30 days</option>
          </select>
        </div>

        <div class="field">
          <label>View Limit</label>
          <input type="number" id="view_limit" placeholder="unlimited" min="1"/>
        </div>
      </div>

      <div class="submit-row">
        <div class="stats">
          <span id="char-count">0 chars</span>
          <span id="line-count">0 lines</span>
        </div>
        <button class="btn-create" id="btn" onclick="createPaste()">create paste →</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div class="footer-text">built in go · <a href="https://github.com/tarunbtw/pastebin" target="_blank">github</a></div>
      <div class="footer-text">ctrl+enter to submit</div>
    </div>
  </footer>

  <script>
    // theme
    const root = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');
    const saved = localStorage.getItem('theme') || 'dark';
    root.setAttribute('data-theme', saved);
    themeBtn.textContent = saved === 'dark' ? '☀' : '☾';

    themeBtn.addEventListener('click', () => {
      const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeBtn.textContent = next === 'dark' ? '☀' : '☾';
    });

    // editor
    const content = document.getElementById('content');
    const gutter = document.getElementById('gutter');
    const editorMeta = document.getElementById('editor-meta');
    const charCount = document.getElementById('char-count');
    const lineCount = document.getElementById('line-count');

    function update() {
      const lines = content.value.split('\n');
      const n = lines.length;
      gutter.textContent = Array.from({length: n}, (_, i) => i + 1).join('\n');
      editorMeta.textContent = n + ' lines';
      charCount.textContent = content.value.length.toLocaleString() + ' chars';
      lineCount.textContent = n + ' lines';
    }

    content.addEventListener('input', update);
    content.addEventListener('scroll', () => { gutter.scrollTop = content.scrollTop; });

    content.addEventListener('keydown', e => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const s = content.selectionStart;
        content.value = content.value.substring(0, s) + '  ' + content.value.substring(content.selectionEnd);
        content.selectionStart = content.selectionEnd = s + 2;
        update();
      }
      if (e.ctrlKey && e.key === 'Enter') createPaste();
    });

    async function createPaste() {
      const btn = document.getElementById('btn');
      const text = content.value.trim();
      if (!text) { content.focus(); return; }

      btn.disabled = true;
      btn.textContent = 'creating...';

      const vl = document.getElementById('view_limit').value;
      const body = {
        content: text,
        language: document.getElementById('language').value,
        expires_in: document.getElementById('expires_in').value,
      };
      if (vl) body.view_limit = parseInt(vl);

      try {
        const res = await fetch('/api/paste', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('something went wrong');
          btn.disabled = false;
          btn.textContent = 'create paste →';
        }
      } catch {
        alert('failed to create paste');
        btn.disabled = false;
        btn.textContent = 'create paste →';
      }
    }

    update();
  </script>
</body>
</html>
