<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>pastebin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg: #111113;
      --bg2: #18181b;
      --surface: #1c1c1f;
      --surface2: #222226;
      --border: #2e2e32;
      --border-focus: #52525b;
      --text: #fafafa;
      --text-dim: #71717a;
      --text-muted: #3f3f46;
      --accent: #ffffff;
      --accent-fg: #000000;
      --scrollbar: #27272a;
      --gone-bg: #1c1c1f;
    }

    :root[data-theme="light"] {
      --bg: #fafafa;
      --bg2: #f4f4f5;
      --surface: #ffffff;
      --surface2: #f4f4f5;
      --border: #e4e4e7;
      --border-focus: #a1a1aa;
      --text: #09090b;
      --text-dim: #71717a;
      --text-muted: #d4d4d8;
      --accent: #09090b;
      --accent-fg: #ffffff;
      --scrollbar: #e4e4e7;
      --gone-bg: #f4f4f5;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: background 0.2s, color 0.2s;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }

    .logo span { color: var(--text-dim); font-weight: 300; }

    .header-right { display: flex; align-items: center; gap: 0.5rem; }

    .btn-header {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 0.35rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .btn-header:hover { border-color: var(--border-focus); color: var(--text); }

    .theme-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .theme-btn:hover { border-color: var(--border-focus); color: var(--text); }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem 1.5rem;
      gap: 0.75rem;
    }

    /* ── META BAR ── */
    .meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .meta-left { display: flex; align-items: center; gap: 0.5rem; }

    .lang-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.2rem 0.6rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }

    .meta-right {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      display: flex;
      gap: 1.2rem;
    }

    .meta-right span { display: flex; align-items: center; gap: 0.3rem; }

    /* ── CODE BLOCK ── */
    .code-container {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      flex: 1;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1rem;
      height: 40px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .code-dots { display: flex; gap: 5px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--border); }

    .code-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .code-body { display: flex; }

    .line-numbers {
      padding: 1rem 0.75rem 1rem 0.5rem;
      min-width: 48px;
      text-align: right;
      border-right: 1px solid var(--border);
      background: var(--surface2);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text-muted);
      user-select: none;
      white-space: pre;
    }

    #paste-content {
      flex: 1;
      padding: 1rem 1.2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-all;
      overflow-x: auto;
    }

    /* ── GONE STATE ── */
    .gone-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gone-box {
      text-align: center;
      padding: 3rem 2rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--gone-bg);
      max-width: 380px;
      width: 100%;
    }

    .gone-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .gone-title {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .gone-sub {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .btn-new {
      display: inline-block;
      background: var(--accent);
      color: var(--accent-fg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      padding: 0.65rem 1.4rem;
      border-radius: 7px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn-new:hover { opacity: 0.8; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: var(--text);
      color: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      opacity: 0;
      transition: all 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    footer {
      border-top: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .footer-text a { color: var(--text-dim); text-decoration: none; }
    .footer-text a:hover { color: var(--text); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    main > * { animation: fadeUp 0.3s ease both; }
    main > *:nth-child(1) { animation-delay: 0.05s; }
    main > *:nth-child(2) { animation-delay: 0.1s; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">paste<span>bin</span></a>
    <div class="header-right">
      <button class="btn-header" onclick="copyContent()">copy</button>
      <a class="btn-header" id="raw-link" href="#" target="_blank">raw</a>
      <a class="btn-header" href="/">new paste</a>
      <button class="theme-btn" id="theme-btn">☀</button>
    </div>
  </header>

  <main id="main">
    <!-- injected by JS -->
  </main>

  <footer>
    <div class="footer-text">built in go · <a href="https://github.com/tarunbtw/pastebin" target="_blank">source</a></div>
    <div class="footer-text" id="footer-meta"></div>
  </footer>

  <div class="toast" id="toast">copied to clipboard</div>

  <script>
    // theme
    const root = document.documentElement;
    const themeBtn = document.getElementById('theme-btn');
    const saved = localStorage.getItem('theme') || 'dark';
    root.setAttribute('data-theme', saved);
    themeBtn.textContent = saved === 'dark' ? '☀' : '☾';

    themeBtn.addEventListener('click', () => {
      const current = root.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      themeBtn.textContent = next === 'dark' ? '☀' : '☾';
    });

    const id = window.location.pathname.replace('/p/', '');
    const main = document.getElementById('main');
    document.getElementById('raw-link').href = '/raw/' + id;

    let pasteContent = '';

    async function load() {
      try {
        const res = await fetch('/api/paste/' + id);

        if (res.status === 404 || res.status === 410) {
          main.innerHTML = `
            <div class="gone-container">
              <div class="gone-box">
                <div class="gone-icon">⌫</div>
                <div class="gone-title">paste not found</div>
                <div class="gone-sub">this paste has expired, reached its view limit, or never existed.</div>
                <a href="/" class="btn-new">new paste →</a>
              </div>
            </div>`;
          return;
        }

        const data = await res.json();
        pasteContent = data.content;

        document.title = 'paste / ' + id;

        const lines = data.content.split('\n');
        const lineNums = Array.from({length: lines.length}, (_, i) => i + 1).join('\n');

        // expiry info
        let expiryText = 'never expires';
        if (data.expires_at) {
          const exp = new Date(data.expires_at);
          expiryText = 'expires ' + exp.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        const viewLimitText = data.view_limit
          ? `${data.view_count + 1} / ${data.view_limit} views`
          : `${data.view_count + 1} views`;

        const created = new Date(data.created_at);
        const createdText = created.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        main.innerHTML = `
          <div class="meta-bar">
            <div class="meta-left">
              <span class="lang-badge">${data.language}</span>
            </div>
            <div class="meta-right">
              <span>${viewLimitText}</span>
              <span>${expiryText}</span>
              <span>${createdText}</span>
            </div>
          </div>

          <div class="code-container">
            <div class="code-header">
              <div class="code-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
              </div>
              <div class="code-id">${id}</div>
            </div>
            <div class="code-body">
              <div class="line-numbers">${lineNums}</div>
              <code id="paste-content">${escapeHtml(data.content)}</code>
            </div>
          </div>`;

        document.getElementById('footer-meta').textContent =
          `${lines.length} lines · ${data.content.length.toLocaleString()} chars`;

      } catch(e) {
        main.innerHTML = `<div style="padding:2rem;font-family:monospace;color:var(--text-dim)">failed to load paste.</div>`;
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function copyContent() {
      if (!pasteContent) return;
      navigator.clipboard.writeText(pasteContent).then(() => {
        const toast = document.getElementById('toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    }

    load();
  </script>
</body>
</html>
